<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAVS</title>
    <link rel="icon" type="image/png" href="https://apzinmix.github.io/favs/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030303; 
            --accent: #ffcc00; 
            --card: rgba(20,20,20,0.6); 
            --trans: all 0.3s ease;
            --gap-size: 60px;
        }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(rgba(255,204,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,204,0,0.02) 1px, transparent 1px); 
            background-size: 50px 50px; 
            color: #fff; font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            padding: var(--gap-size) 20px; 
        }

        /* Navegação Superior Direita */
        nav {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 25px;
        }

        .nav-link {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            cursor: pointer;
            transition: var(--trans);
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        h1 { 
            font-family: 'Orbitron'; 
            color: var(--accent); 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            margin: 0 0 var(--gap-size) 0; 
            font-size: 1.8rem; 
            text-shadow: 0 0 15px rgba(255,204,0,0.2);
            cursor: pointer;
        }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 15px; 
            width: 100%; 
            max-width: 1000px; 
            transition: var(--trans);
        }

        .section-divider { grid-column: 1 / -1; display: flex; align-items: center; margin: 30px 0 15px; opacity: 0.5; }
        .section-divider::before, .section-divider::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        .section-divider span { font-family: 'Orbitron'; font-size: 0.6rem; letter-spacing: 5px; padding: 0 20px; color: var(--accent); }
        
        .fav-card { 
            background: var(--card); 
            backdrop-filter: blur(10px); 
            border-radius: 12px; 
            height: 90px;
            text-decoration: none; 
            display: flex; align-items: center; justify-content: center;
            transition: var(--trans); 
            border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; position: relative; overflow: hidden;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .fav-card:hover { 
            border-color: var(--accent); 
            background: rgba(40, 40, 40, 0.8);
            box-shadow: 0 0 20px rgba(255,204,0,0.1);
        }

        .fav-card img, .emoji-icon { 
            width: 32px; height: 32px; 
            transition: var(--trans); 
            opacity: 1;
            position: absolute;
        }

        .fav-card span { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 700; 
            color: var(--accent);
            text-align: center;
            padding: 0 10px;
            transition: var(--trans); 
            opacity: 0;
            transform: scale(0.8);
            position: absolute;
        }

        .fav-card:hover img, .fav-card:hover .emoji-icon { opacity: 0; transform: scale(0.5); }
        .fav-card:hover span { opacity: 1; transform: scale(1); text-shadow: 0 0 10px rgba(255,204,0,0.3); }

        .emoji-icon { font-size: 28px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="resetView()">
    <nav onclick="event.stopPropagation()">
        <div class="nav-link" id="nav-google" onclick="renderHub('google')">Google</div>
        <div class="nav-link" id="nav-streaming" onclick="renderHub('streaming')">Streamings</div>
    </nav>

    <h1 id="main-title" onclick="resetView()">FAVS HUB</h1>
    <div id="main-grid" class="grid-container" onclick="event.stopPropagation()"></div>

    <script>
        // --- BASE DE DADOS MANTIDA ---
        const linksHome = [
            { n: "YouTube", u: "https://youtube.com" },
            { n: "URL to MP3", u: "https://y2meta.is" },
            { n: "Canva", u: "https://canva.com" },
            { n: "SoundCloud", u: "https://soundcloud.com" },
            { n: "Tidal", u: "https://tidal.com" },
            { n: "Looperman", u: "https://looperman.com" },
            { n: "Splice", u: "https://splice.com" },
            { n: "Identifyy", u: "https://identifyy.com" },
            { n: "Tunebat", u: "https://tunebat.com" },
            { n: "ChatGPT", u: "https://chatgpt.com" },
            { n: "Gemini", u: "https://gemini.google.com" },
            { n: "Beatplace", u: "https://beatplace.co" },
            { n: "Instagram", u: "https://instagram.com" },
            { n: "Substack", u: "https://substack.com" },
            { n: "Hotmart", u: "https://sso.hotmart.com" },
            { n: "GitHub", u: "https://github.com" },
            { n: "Mercado Livre", u: "https://mercadolivre.com.br" },
            { n: "Notion", u: "https://notion.com" },
            { n: "Portal Abramus", u: "https://portal.abramus.org.br" }
        ];

        const linksGoogle = [
            { n: "Agenda", u: "https://calendar.google.com", i: "https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" },
            { n: "Drive", u: "https://drive.google.com", i: "https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" },
            { n: "Gmail", u: "https://mail.google.com", i: "https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" },
            { n: "Keep", u: "https://keep.google.com", i: "https://www.gstatic.com/images/branding/product/2x/keep_2020q4_48dp.png" }
        ];

        const streamOriginais = [
            { n: "Netflix", u: "https://netflix.com" }, { n: "Prime Video", u: "https://primevideo.com" },
            { n: "Disney+", u: "https://disneyplus.com" }, { n: "HBO Max", u: "https://hbo.com" }
        ];

        const streamPiratas = [
            { n: "NetCine", u: "https://netcinevu.lat" }, { n: "Crack Sports", u: "https://cracksports.me" },
            { n: "Watchseries", u: "https://watchseries.bar" }, { n: "Solar Movie", u: "https://solarmoviesz.com" }, { n: "Hurawatch", u: "https://123chill.uk" }
        ];

        const createCard = (l) => `
            <a href="${l.u}" class="fav-card" target="_blank">
                <img src="${l.i || 'https://www.google.com/s2/favicons?domain='+l.u+'&sz=128'}">
                <span>${l.n}</span>
            </a>`;

        const mainGrid = document.getElementById('main-grid');
        const mainTitle = document.getElementById('main-title');

        // --- LÓGICA DE NAVEGAÇÃO ---

        function renderHub(hub) {
            mainGrid.innerHTML = ""; // Limpa a tela
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            if (hub === 'google') {
                mainTitle.innerText = "GOOGLE HUB";
                document.getElementById('nav-google').classList.add('active');
                mainGrid.innerHTML = linksGoogle.map(createCard).join('');
            } 
            else if (hub === 'streaming') {
                mainTitle.innerText = "STREAMINGS HUB";
                document.getElementById('nav-streaming').classList.add('active');
                mainGrid.innerHTML = `
                    <div class="section-divider"><span>Originais</span></div>
                    ${streamOriginais.map(createCard).join('')}
                    <div class="section-divider"><span>Piratas</span></div>
                    ${streamPiratas.map(createCard).join('')}
                `;
            }
        }

        function resetView() {
            mainTitle.innerText = "FAVORITES HUB";
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            mainGrid.innerHTML = linksHome.map(createCard).join('');
        }

        // Inicializa o site na Home
        resetView();
    </script>
</body>
</html>
