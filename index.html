<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favs Hub</title>
    
    <link rel="icon" type="image/png" href="https://apzinmix.github.io/favs/img/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(22, 22, 22, 0.8);
            --accent-color: #ffcc00; /* Amarelo Nômade */
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            /* Grid futurista no fundo */
            background-image: 
                linear-gradient(rgba(255, 204, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 204, 0, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-color);
            letter-spacing: 10px;
            margin-bottom: 50px;
            font-size: 2rem;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            animation: fadeIn 1s ease-in;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1100px;
            width: 100%;
        }

        .fav-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 25px 10px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            cursor: pointer;
            text-align: center;
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        .fav-card:hover {
            transform: translateY(-5px) scale(1.03);
            border-color: var(--accent-color);
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.15);
            z-index: 10;
        }

        .fav-card img {
            width: 38px;
            height: 38px;
            margin-bottom: 12px;
            border-radius: 6px;
            object-fit: contain;
            transition: var(--transition);
        }

        .fav-card:hover img {
            filter: drop-shadow(0 0 5px var(--accent-color));
        }

        .emoji-icon {
            font-size: 32px;
            margin-bottom: 12px;
            line-height: 1;
        }

        /* Texto Branco -> Amarelo no Hover */
        .fav-card span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: #ffffff; /* Inicialmente Branco */
            transition: var(--transition);
        }

        .fav-card:hover span {
            color: var(--accent-color); /* Fica Amarelo no Hover */
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
        }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #111;
            padding: 35px;
            border-radius: 24px;
            border: 1px solid var(--accent-color);
            width: 90%;
            max-width: 500px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.1);
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .tab-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #555;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            padding: 8px 15px;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        .modal-grid, .tab-content {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .tab-content { display: none; grid-template-columns: repeat(3, 1fr); }
        .tab-content.active { display: grid; }

        h3 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1rem;
            color: var(--accent-color);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Scrollbar Cyber */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: #050505; }
    </style>
</head>
<body>

    <h1>FAVS HUB</h1>

    <div class="grid-container">
        <a href="https://youtube.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=128" alt="">

        <a href="https://canva.com" class="fav-card" target="_blank">

        <a href="https://soundcloud.com" class="fav-card" target="_blank">

        <a href="https://looperman.com" class="fav-card" target="_blank">

        </a>

        <a href="https://identifyy.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=identifyy.com&sz=128" alt="">
            <span>Identifyy</span>
        </a>

        <a href="https://tunebat.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=tunebat.com&sz=128" alt="">
            <span>Tunebat</span>
        </a>

        <a href="https://chatgpt.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=chatgpt.com&sz=128" alt="">
            <span>ChatGPT</span>

        <a href="https://beatplace.co" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=beatplace.co&sz=128" alt="">

        <a href="https://instagram.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=instagram.com&sz=128" alt="">
            <span>Instagram</span>
        </a>

        <a href="https://github.com" class="fav-card" target="_blank">
            <img src="https://www.google.com/s2/favicons?domain=github.com&sz=128" alt="">
            <span>GitHub</span>
        </a>
        
        <div class="fav-card" onclick="openModal('googleModal')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            <span>Google Hub</span>
        </div>

        <div class="fav-card" onclick="openModal('streamingModal')">
            <div class="emoji-icon">🎬</div>
            <span>Streamings</span>
        </div>
    </div>

    <div id="googleModal" class="modal" onclick="closeModal('googleModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Google Hub</h3>
            <div class="modal-grid">
                <a href="https://calendar.google.com" class="fav-card" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" alt="">
                    <span>Agenda</span>
                </a>
                <a href="https://drive.google.com" class="fav-card" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="">
                    <span>Drive</span>
                </a>
                <a href="https://mail.google.com" class="fav-card" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="">
                    <span>Gmail</span>
                </a>
                <a href="https://keep.google.com" class="fav-card" target="_blank">
                    <img src="https://www.gstatic.com/images/branding/product/2x/keep_2020q4_48dp.png" alt="">
                    <span>Keep</span>
                </a>
            </div>
        </div>
    </div>

    <div id="streamingModal" class="modal" onclick="closeModal('streamingModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="tab-container">
                <button class="tab-btn active" onclick="showTab('originais', event)">Originais</button>
                <button class="tab-btn" onclick="showTab('piratas', event)">Piratas</button>
            </div>

            <div id="originais" class="tab-content active">
                <a href="https://netflix.com" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=netflix.com&sz=64" alt="">
                    <span>Netflix</span>
                </a>
                <a href="https://primevideo.com" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=primevideo.com&sz=64" alt="">
                    <span>Prime Video</span>
                </a>
                <a href="https://disneyplus.com" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=disneyplus.com&sz=64" alt="">
                    <span>Disney+</span>
                </a>
                <a href="https://hbo.com" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=hbo.com&sz=64" alt="">
                    <span>HBO Max</span>
                </a>
            </div>

            <div id="piratas" class="tab-content">
                <a href="https://netcinevu.lat" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=netcinevu.lat&sz=64" alt="">
                    <span>NetCine</span>
                </a>
                <a href="https://cracksports.me" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=cracksports.me&sz=64" alt="">
                    <span>Crack Sports</span>
                </a>
                <a href="https://watchseries.bar" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=watchseries.bar&sz=64" alt="">
                    <span>Watchseries</span>
                </a>
                <a href="https://solarmoviesz.com" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=solarmoviesz.com&sz=64" alt="">
                    <span>Solar Movie</span>
                </a>
                <a href="https://123chill.uk" class="fav-card" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=123chill.uk&sz=64" alt="">
                    <span>Hurawatch</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); }, 10);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function showTab(tabId, event) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                document.querySelectorAll('.modal').forEach(m => closeModal(m.id));
            }
        });
    </script>
</body>
</html>
