<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>favs Hub</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-color: #ffcc00; /* Amarelo Nômade */
            --text-color: #ffffff;
            --border-color: #2a2a2a;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--accent-color);
            letter-spacing: 4px;
            margin-bottom: 50px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1100px;
            width: 100%;
        }

        /* Estilo Base do Botão */
        .fav-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px 10px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            cursor: pointer;
            text-align: center;
        }

        .fav-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.15);
            background: #1f1f1f;
        }

        .fav-card img {
            width: 35px;
            height: 35px;
            margin-bottom: 12px;
            border-radius: 6px;
            object-fit: contain;
        }

        .emoji-icon {
            font-size: 32px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .fav-card span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            color: #888;
            transition: var(--transition);
        }

        .fav-card:hover span {
            color: var(--accent-color);
        }

        /* Modal / Pop-up */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid var(--accent-color);
            width: 90%;
            max-width: 500px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Abas dentro do Modal */
        .tab-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #666;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 8px 15px;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .tab-content {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .tab-content.active {
            display: grid;
        }

        .modal.active { display: flex; }

    </style>
</head>
<body>

    </div>

    <script>
        function openModal() {
            document.getElementById('streamingModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('streamingModal').classList.remove('active');
        }

        function showTab(tabId, event) {
            // Esconde todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Desativa todos os botões de aba
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Ativa o selecionado
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Fecha o modal ao apertar a tecla ESC
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeModal();
        });
    </script>
